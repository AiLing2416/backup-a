name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: AMD64
            platform: linux/amd64
          - arch: ARM64
            platform: linux/arm64
    env:
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
      GHCR_REPOSITORY: ghcr.io/ailing2416/backup-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub repository secret
        run: |
          if [ -z "$DOCKERHUB_REPOSITORY" ]; then
            echo "Repository secret DOCKERHUB_REPOSITORY is required, e.g. ailing2416/backup-a"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          ARCH: ${{ matrix.arch }}
          REPOSITORY: ${{ env.DOCKERHUB_REPOSITORY }}
          GHCR_REPOSITORY: ${{ env.GHCR_REPOSITORY }}
        run: |
          tags=""

          add_tag() {
            local tag="$1"
            tags="${tags}docker.io/${REPOSITORY}:${tag}"$'\n'
            tags="${tags}${GHCR_REPOSITORY}:${tag}"$'\n'
          }

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
            add_tag "${version}-${ARCH}"
            if [[ "${ARCH}" == "AMD64" ]]; then
              add_tag "${version}"
            fi
          else
            add_tag "${ARCH}"
            if [[ "${ARCH}" == "AMD64" ]]; then
              add_tag "latest"
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s' "$tags"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.description=Containerized backup image for self-hosted data
