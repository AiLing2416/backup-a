name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_REPOSITORY }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub repository secret
        run: |
          if [ -z "$DOCKERHUB_REPOSITORY" ]; then
            echo "Repository secret DOCKERHUB_REPOSITORY is required, e.g. ailing2416/backup-a"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
