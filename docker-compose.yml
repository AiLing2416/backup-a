services:
  backup-a:
    build: .
    container_name: backup-a
    restart: unless-stopped

    # 从本地 .env 读取认证信息和桶名
    env_file:
      - .env

    environment:
      # 时区
      - TZ=Asia/Shanghai

      # 备份任务计划: Ofelia 使用六段式 cron
      - CRON_SCHEDULE=0 0 2 * * *

      # 清理任务计划: 默认在备份开始后 30 分钟执行
      - PRUNE_SCHEDULE=0 30 2 * * *

      # 远端保留天数, 0 表示关闭自动清理
      - RETENTION_DAYS=30

      # 存储类型: 常见为 s3 或 b2
      - TYPE=s3

      # S3 兼容服务通常使用 Other
      - PROVIDER=Other

      # 对象存储接入地址
      - ENDPOINT=https://s3.us-west-004.backblazeb2.com

      # 以下值从 .env 注入
      - ACCESS_KEY=${ACCESS_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - BUCKET=${BUCKET}

      # Webhook 通知地址, 可选
      # - WEBHOOK_URL=https://your-webhook.example.com/notify

      # Rclone 上传缓冲区大小
      - RCLONE_BUFFER_SIZE=16M

      # 可选: 手动指定压缩线程数
      # - PIGZ_THREADS=2

    volumes:
      # 将需要备份的宿主机目录挂载到 /backup/ 下
      # 必须带 :ro, 否则容器启动时会拒绝运行
      - /opt/data/nextcloud:/backup/nextcloud:ro
      - /opt/data/mysql_dumps:/backup/mysql:ro
